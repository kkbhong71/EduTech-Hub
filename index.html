<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>열정맨 에듀테크 허브 | 오성중학교</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald-950:#022c22;--emerald-900:#064e3b;--emerald-800:#065f46;
            --emerald-700:#047857;--emerald-600:#059669;--emerald-500:#10b981;
            --emerald-400:#34d399;--emerald-300:#6ee7b7;--emerald-200:#a7f3d0;
            --emerald-100:#d1fae5;--emerald-50:#ecfdf5;
            --stone-950:#0c0a09;--stone-900:#1c1917;--stone-800:#292524;
            --stone-700:#44403c;--stone-600:#57534e;--stone-500:#78716c;
            --stone-400:#a8a29e;--stone-300:#d6d3d1;--stone-200:#e7e5e4;
            --stone-100:#f5f5f4;--stone-50:#fafaf9;
            --amber-500:#f59e0b;--amber-100:#fef3c7;
            --blue-500:#3b82f6;--violet-500:#8b5cf6;--violet-100:#ede9fe;
            --rose-500:#f43f5e;--rose-100:#ffe4e6;--cyan-500:#06b6d4;
            --bg:#f7f6f3;--surface:#ffffff;
            --text-primary:var(--stone-900);--text-secondary:var(--stone-500);
            --text-muted:var(--stone-400);--border:#e8e6e1;--border-light:#f0eee9;
            --cat-school:#1d4ed8;--cat-school-bg:#eff6ff;
            --cat-data:#0e7490;--cat-data-bg:#ecfeff;
            --cat-edu:#b45309;--cat-edu-bg:#fffbeb;
            --cat-science:#7c3aed;--cat-science-bg:#f5f3ff;
            --radius:14px;--radius-sm:8px;--radius-xs:6px;
            --transition:0.35s cubic-bezier(0.22,1,0.36,1);
            --shadow-xs:0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
            --shadow-lg:0 12px 40px rgba(0,0,0,0.08),0 4px 12px rgba(0,0,0,0.04);
            --shadow-glow:0 0 20px rgba(5,150,105,0.12);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.65;-webkit-font-smoothing:antialiased;}
        .hero{position:relative;background:var(--emerald-950);color:#fff;padding:3.5rem 2rem 3rem;overflow:hidden;}
        .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 80%,rgba(16,185,129,0.2) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 85% 20%,rgba(6,78,59,0.6) 0%,transparent 60%),radial-gradient(ellipse 80% 40% at 50% 110%,rgba(52,211,153,0.1) 0%,transparent 50%);}
        .hero::after{content:'';position:absolute;inset:0;opacity:0.35;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");background-size:128px 128px;pointer-events:none;}
        .hero__dots{position:absolute;top:1.5rem;right:2rem;display:grid;grid-template-columns:repeat(5,6px);gap:8px;opacity:0.15;z-index:1;}
        .hero__dots span{width:6px;height:6px;background:var(--emerald-300);border-radius:50%;}
        .hero__line{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--emerald-400),var(--emerald-600),var(--amber-500),var(--emerald-400));background-size:200% 100%;animation:shimmer 6s ease-in-out infinite;}
        @keyframes shimmer{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
        .hero__inner{position:relative;z-index:2;max-width:820px;margin:0 auto;text-align:center;}
        .hero__eyebrow{display:inline-flex;align-items:center;gap:0.5rem;font-family:'DM Mono',monospace;font-size:0.68rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--emerald-300);margin-bottom:1.1rem;animation:fadeUp 0.7s ease-out;}
        .hero__eyebrow::before,.hero__eyebrow::after{content:'';width:20px;height:1px;background:var(--emerald-400);opacity:0.5;}
        .hero__title{font-family:'Plus Jakarta Sans','Noto Sans KR',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-0.035em;line-height:1.2;margin-bottom:0.5rem;animation:fadeUp 0.7s ease-out 0.08s both;}
        .hero__title em{font-style:normal;color:var(--emerald-400);}
        .hero__desc{font-size:0.88rem;font-weight:300;color:rgba(255,255,255,0.55);max-width:460px;margin:0 auto;animation:fadeUp 0.7s ease-out 0.16s both;}
        .hero__metrics{display:inline-flex;gap:0;margin-top:1.8rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;backdrop-filter:blur(8px);animation:fadeUp 0.7s ease-out 0.24s both;}
        .metric{padding:0.8rem 1.5rem;text-align:center;border-right:1px solid rgba(255,255,255,0.06);}
        .metric:last-child{border-right:none;}
        .metric__val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.35rem;font-weight:800;color:#fff;display:block;line-height:1;margin-bottom:0.2rem;}
        .metric__label{font-size:0.62rem;font-weight:400;color:rgba(255,255,255,0.4);letter-spacing:0.03em;}
        .nav-wrap{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;transition:box-shadow 0.25s;}
        .nav-wrap.scrolled{box-shadow:0 4px 20px rgba(0,0,0,0.05);}
        .nav{max-width:920px;margin:0 auto;padding:0.7rem 1.5rem;display:flex;gap:0.35rem;justify-content:center;flex-wrap:wrap;}
        .nav__btn{font-family:'Noto Sans KR',sans-serif;font-size:0.76rem;font-weight:500;padding:0.42rem 1rem;border:1.5px solid transparent;border-radius:99px;background:var(--stone-100);color:var(--stone-600);cursor:pointer;transition:var(--transition);white-space:nowrap;}
        .nav__btn:hover{background:var(--emerald-50);color:var(--emerald-800);border-color:var(--emerald-200);}
        .nav__btn.active{background:var(--emerald-900);color:#fff;border-color:var(--emerald-900);box-shadow:0 2px 8px rgba(6,78,59,0.2);}
        .main{max-width:920px;margin:0 auto;padding:2rem 1.5rem;}
        .section{margin-bottom:2.5rem;opacity:0;transform:translateY(24px);transition:opacity 0.6s ease-out,transform 0.6s ease-out;}
        .section.visible{opacity:1;transform:translateY(0);}
        .section[data-hidden="true"]{display:none;}
        .section__header{display:flex;align-items:center;gap:0.65rem;margin-bottom:1.1rem;padding-bottom:0.75rem;border-bottom:1.5px solid var(--border-light);}
        .section__icon-wrap{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;box-shadow:var(--shadow-xs);background:var(--stone-100);border:1px solid var(--border-light);}
        .section__title{font-family:'Plus Jakarta Sans','Noto Sans KR',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:-0.015em;color:var(--stone-800);}
        .section__count{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-muted);margin-left:auto;background:var(--stone-100);padding:0.18rem 0.6rem;border-radius:99px;border:1px solid var(--border-light);}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:0.9rem;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.2rem 1rem;display:flex;flex-direction:column;gap:0.55rem;position:relative;overflow:hidden;transition:var(--transition);opacity:0;transform:translateY(18px);animation:cardReveal 0.55s ease-out forwards;}
        .card::after{content:'';position:absolute;top:12px;bottom:12px;left:0;width:3px;border-radius:0 3px 3px 0;opacity:0;transition:opacity 0.3s,top 0.3s,bottom 0.3s;background:var(--emerald-600);}
        .card:hover{border-color:var(--emerald-200);box-shadow:var(--shadow-lg),var(--shadow-glow);transform:translateY(-4px);}
        .card:hover::after{opacity:1;top:8px;bottom:8px;}
        .card__head{display:flex;align-items:flex-start;gap:0.5rem;}
        .card__status{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:0.35rem;}
        .card__status--live{background:var(--emerald-500);box-shadow:0 0 0 3px rgba(16,185,129,0.12);}
        .card__status--dev{background:var(--amber-500);box-shadow:0 0 0 3px rgba(245,158,11,0.12);}
        .card__status--colab{background:var(--violet-500);box-shadow:0 0 0 3px rgba(139,92,246,0.12);}
        .card__name{font-family:'Plus Jakarta Sans','Noto Sans KR',sans-serif;font-size:0.88rem;font-weight:700;color:var(--stone-800);line-height:1.35;}
        .card__desc{font-size:0.76rem;color:var(--stone-500);line-height:1.6;flex:1;}
        .card__tags{display:flex;gap:0.3rem;flex-wrap:wrap;}
        .tag{font-family:'DM Mono',monospace;font-size:0.58rem;font-weight:500;padding:0.18rem 0.55rem;border-radius:99px;}
        .card__go{display:flex;align-items:center;justify-content:center;gap:0.35rem;font-family:'Noto Sans KR',sans-serif;font-size:0.74rem;font-weight:600;color:var(--emerald-700);text-decoration:none;padding:0.55rem 0.8rem;border-radius:var(--radius-sm);border:1.5px solid var(--emerald-200);background:linear-gradient(135deg,var(--emerald-50) 0%,#f0fdf8 100%);transition:var(--transition);margin-top:0.15rem;}
        .card__go:hover{background:var(--emerald-700);color:#fff;border-color:var(--emerald-700);box-shadow:0 3px 10px rgba(4,120,87,0.2);}
        .card__go--colab{color:var(--violet-500);border-color:#ddd6fe;background:linear-gradient(135deg,#faf5ff 0%,#f5f3ff 100%);}
        .card__go--colab:hover{background:var(--violet-500);color:#fff;border-color:var(--violet-500);}
        .card__go-arrow{transition:transform 0.25s;font-size:0.8rem;}
        .card__go:hover .card__go-arrow{transform:translateX(3px);}
        .legend{display:flex;gap:1.5rem;justify-content:center;padding:1rem;font-size:0.68rem;color:var(--text-muted);flex-wrap:wrap;}
        .legend__item{display:flex;align-items:center;gap:0.4rem;}
        .legend__dot{width:7px;height:7px;border-radius:50%;}
        .footer{text-align:center;padding:2rem 1.5rem;font-size:0.7rem;color:var(--stone-400);background:var(--surface);border-top:1px solid var(--border-light);}
        .footer__brand{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.75rem;color:var(--stone-600);margin-bottom:0.3rem;}
        .footer a{color:var(--emerald-600);text-decoration:none;font-weight:500;}
        .footer a:hover{text-decoration:underline;}
        .admin-trigger{position:fixed;bottom:1.2rem;right:1.2rem;z-index:200;width:44px;height:44px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--stone-400);font-size:1rem;cursor:pointer;transition:var(--transition);box-shadow:0 4px 16px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;}
        .admin-trigger:hover{background:var(--emerald-50);border-color:var(--emerald-300);color:var(--emerald-700);transform:translateY(-2px);box-shadow:var(--shadow-lg);}
        .admin-overlay{position:fixed;inset:0;z-index:300;background:rgba(12,10,9,0.45);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:1rem;}
        .admin-overlay.open{display:flex;}
        .admin-panel{background:var(--surface);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 70px rgba(0,0,0,0.2);animation:panelIn 0.35s ease-out;border:1px solid var(--border-light);}
        @keyframes panelIn{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
        .admin-panel__header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;border-bottom:1px solid var(--border-light);position:sticky;top:0;background:var(--surface);z-index:1;border-radius:16px 16px 0 0;}
        .admin-panel__title{font-family:'Plus Jakarta Sans','Noto Sans KR',sans-serif;font-size:0.95rem;font-weight:700;display:flex;align-items:center;gap:0.45rem;}
        .admin-panel__close{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--stone-50);color:var(--stone-400);cursor:pointer;font-size:0.9rem;transition:var(--transition);}
        .admin-panel__close:hover{background:var(--stone-200);color:var(--stone-700);}
        .admin-panel__body{padding:1.4rem;}
        .admin-login{text-align:center;padding:2rem 1rem;}
        .admin-login__icon{font-size:2.2rem;margin-bottom:0.7rem;}
        .admin-login__title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:0.2rem;}
        .admin-login__desc{font-size:0.76rem;color:var(--text-secondary);margin-bottom:1.2rem;}
        .admin-login__input{width:100%;max-width:260px;padding:0.55rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Noto Sans KR',sans-serif;font-size:0.84rem;text-align:center;outline:none;transition:var(--transition);background:var(--stone-50);}
        .admin-login__input:focus{border-color:var(--emerald-400);box-shadow:0 0 0 3px rgba(52,211,153,0.12);background:#fff;}
        .admin-login__input.error{border-color:var(--rose-500);box-shadow:0 0 0 3px rgba(244,63,94,0.1);animation:shake 0.4s;}
        @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
        .admin-login__btn{margin-top:0.7rem;padding:0.5rem 1.6rem;border:none;border-radius:var(--radius-sm);background:var(--emerald-800);color:#fff;font-weight:600;font-size:0.8rem;cursor:pointer;transition:var(--transition);font-family:'Noto Sans KR',sans-serif;}
        .admin-login__btn:hover{background:var(--emerald-950);}
        .admin-section{margin-bottom:1.4rem;}
        .admin-section__title{font-size:0.78rem;font-weight:600;color:var(--stone-500);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem;}
        .token-bar{display:flex;gap:0.4rem;align-items:center;}
        .token-bar input{flex:1;padding:0.45rem 0.7rem;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:'DM Mono',monospace;font-size:0.7rem;outline:none;background:var(--stone-50);}
        .token-bar input:focus{border-color:var(--emerald-400);background:#fff;}
        .token-bar button{padding:0.45rem 0.75rem;border:none;border-radius:var(--radius-xs);background:var(--emerald-800);color:#fff;font-size:0.7rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:var(--transition);}
        .token-bar button:hover{background:var(--emerald-950);}
        .token-status{font-size:0.68rem;margin-top:0.3rem;}
        .token-status.ok{color:var(--emerald-600);}
        .token-status.none{color:var(--text-muted);}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.55rem;}
        .form-grid--full{grid-column:1/-1;}
        .form-field label{display:block;font-size:0.68rem;font-weight:600;color:var(--stone-500);margin-bottom:0.15rem;}
        .form-field input,.form-field select,.form-field textarea{width:100%;padding:0.45rem 0.65rem;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;outline:none;transition:var(--transition);background:var(--stone-50);}
        .form-field textarea{resize:vertical;min-height:56px;}
        .form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--emerald-400);box-shadow:0 0 0 3px rgba(52,211,153,0.08);background:#fff;}
        .form-actions{display:flex;gap:0.4rem;margin-top:0.6rem;grid-column:1/-1;}
        .btn{padding:0.48rem 1.1rem;border:none;border-radius:var(--radius-xs);font-weight:600;font-size:0.76rem;cursor:pointer;transition:var(--transition);font-family:'Noto Sans KR',sans-serif;}
        .btn--primary{background:var(--emerald-800);color:#fff;}
        .btn--primary:hover{background:var(--emerald-950);}
        .btn--secondary{background:var(--stone-100);color:var(--stone-600);border:1px solid var(--border);}
        .btn--secondary:hover{background:var(--stone-200);}
        .btn:disabled{opacity:0.5;cursor:not-allowed;}
        .admin-project{display:flex;align-items:center;gap:0.55rem;padding:0.55rem 0;border-bottom:1px solid var(--border-light);font-size:0.78rem;}
        .admin-project:last-child{border-bottom:none;}
        .admin-project__cat{font-size:0.85rem;}
        .admin-project__name{flex:1;font-weight:500;color:var(--stone-700);}
        .admin-project__status{font-size:0.6rem;padding:0.1rem 0.42rem;border-radius:99px;font-weight:600;}
        .admin-project__status--live{background:var(--emerald-100);color:var(--emerald-800);}
        .admin-project__status--dev{background:var(--amber-100);color:#92400e;}
        .admin-project__status--colab{background:var(--violet-100);color:#5b21b6;}
        .admin-project__actions{display:flex;gap:0.25rem;}
        .admin-project__btn{width:26px;height:26px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.7rem;transition:var(--transition);display:flex;align-items:center;justify-content:center;}
        .admin-project__btn:hover{background:var(--stone-100);}
        .admin-project__btn--del:hover{background:var(--rose-100);border-color:#fecdd3;color:var(--rose-500);}
        .help-text{font-size:0.67rem;color:var(--text-muted);margin-top:0.25rem;line-height:1.45;}
        .help-text a{color:var(--emerald-600);}
        /* Category add bar */
        .cat-add-bar{display:flex;gap:0.35rem;align-items:center;margin-top:0.5rem;}
        .cat-add-bar input{flex:1;padding:0.4rem 0.6rem;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:0.76rem;outline:none;background:var(--stone-50);font-family:'Noto Sans KR',sans-serif;}
        .cat-add-bar input:focus{border-color:var(--emerald-400);background:#fff;}
        .cat-add-bar .cat-icon-input{width:50px;text-align:center;}
        .cat-add-bar button{padding:0.4rem 0.7rem;border:none;border-radius:var(--radius-xs);background:var(--emerald-800);color:#fff;font-size:0.72rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
        .cat-item{display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0;border-bottom:1px solid var(--border-light);font-size:0.78rem;}
        .cat-item:last-child{border-bottom:none;}
        .cat-item__icon{font-size:0.9rem;}
        .cat-item__label{flex:1;font-weight:500;color:var(--stone-700);}
        .cat-item__count{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-muted);}
        .cat-item__del{width:24px;height:24px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.65rem;transition:var(--transition);display:flex;align-items:center;justify-content:center;}
        .cat-item__del:hover{background:var(--rose-100);border-color:#fecdd3;color:var(--rose-500);}
        .cat-item__edit{width:24px;height:24px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.65rem;transition:var(--transition);display:flex;align-items:center;justify-content:center;}
        .cat-item__edit:hover{background:var(--emerald-50);border-color:var(--emerald-300);color:var(--emerald-700);}
        .cat-item__actions{display:flex;gap:0.2rem;}
        .toast{position:fixed;top:1rem;right:1rem;z-index:400;padding:0.65rem 1.1rem;border-radius:10px;font-size:0.78rem;font-weight:500;color:#fff;transform:translateX(120%);transition:transform 0.3s ease;box-shadow:0 6px 20px rgba(0,0,0,0.15);}
        .toast.show{transform:translateX(0);}
        .toast--success{background:var(--emerald-700);}
        .toast--error{background:var(--rose-500);}
        .toast--info{background:var(--blue-500);}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
        @keyframes cardReveal{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
        .loading{text-align:center;padding:3rem;color:var(--text-muted);font-size:0.84rem;}
        .loading__spinner{width:26px;height:26px;border:3px solid var(--emerald-100);border-top-color:var(--emerald-600);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 0.7rem;}
        @keyframes spin{to{transform:rotate(360deg);}}
        @media(max-width:600px){
            .hero{padding:2.2rem 1.2rem 1.8rem;}.hero__title{font-size:1.4rem;}.hero__dots{display:none;}
            .metric{padding:0.6rem 1rem;}.metric__val{font-size:1.1rem;}
            .grid{grid-template-columns:1fr;}.nav{padding:0.55rem 1rem;gap:0.25rem;}
            .nav__btn{font-size:0.7rem;padding:0.35rem 0.7rem;}.form-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>
<header class="hero">

<script>
/* ═══════════════════════════════════════════
   CONFIG & DATA
   ═══════════════════════════════════════════ */
const CONFIG = {
    GITHUB_OWNER: 'kkbhong71',
    GITHUB_REPO: 'EduTech-Hub',
    FILE_PATH: 'projects.json',
    ADMIN_PASSWORD: 'edu2026',
    TOKEN_KEY: 'edutech_github_token',
    AUTH_KEY: 'edutech_admin_auth'
};

const TAG_STYLES = {
    'Flask':{bg:'#fef2f2',color:'#dc2626'},'Render':{bg:'#fff7ed',color:'#ea580c'},
    'GitHub Pages':{bg:'#ecfdf5',color:'#059669'},'Colab':{bg:'#f5f3ff',color:'#7c3aed'},
    'HTML/JS':{bg:'#f0f9ff',color:'#0284c7'},'HTML':{bg:'#f0f9ff',color:'#0284c7'},
    '가이드':{bg:'#f1f5f9',color:'#64748b'}
};

let CAT_ICONS = {};
let SITE_DATA = null;
let GITHUB_SHA = null;
let editingProjectId = null;
let editingCategoryId = null;

const FALLBACK_DATA = {
    site:{title:"열정맨 에듀테크 허브",subtitle:"오성중학교 · 교육 행정 & 데이터 사이언스",footer:"© 2026 열정맨 · 오성중학교 에듀테크"},
    categories:[
        {id:"school",icon:"🏫",label:"학교 행정 시스템"},
        {id:"data",icon:"📊",label:"학생 데이터 분석"},
        {id:"edu",icon:"📚",label:"교육 자료"},
        {id:"science",icon:"🎯",label:"데이터 사이언스"}
    ],
    projects:[
        {id:"p001",name:"동료장학 관리 시스템",category:"school",url:"https://peer-observation.onrender.com",desc:"교사 간 수업 참관 기록 및 관리. 교과별 자동 정렬, PostgreSQL 기반",tags:["Flask","Render"],status:"live"},
        {id:"p002",name:"장학금 관리 시스템",category:"school",url:"#",desc:"7개 모듈 탑재, 18조 장학금 규정 뷰어 포함. 신청·심사·지급 관리",tags:["Flask","Render"],status:"live"},
        {id:"p003",name:"동아리 편성 시스템",category:"school",url:"#",desc:"학생 동아리 배정 및 관리. 희망 조사 기반 자동 편성 기능",tags:["Flask","Render"],status:"live"},
        {id:"p004",name:"방과후학교 등록 시스템",category:"school",url:"#",desc:"다요일 스케줄링, 시간 충돌 검증. 학생 수강 신청 관리",tags:["Flask","Render"],status:"live"},
        {id:"p005",name:"학생 성적 대시보드",category:"data",url:"#",desc:"Premium Slate 테마. 학생 상담용 성적 분석 및 시각화 도구",tags:["GitHub Pages","HTML/JS"],status:"live"},
        {id:"p006",name:"기초학력 향상 계획 대시보드",category:"data",url:"#",desc:"기초학력 향상 계획 현황 관리 및 모니터링 대시보드",tags:["GitHub Pages","HTML/JS"],status:"live"},
        {id:"p007",name:"Flask 웹앱 배포 가이드",category:"edu",url:"#",desc:"Flask + Render.com 배포 전 과정 한글 가이드. 초보자용 단계별 설명",tags:["GitHub Pages","가이드"],status:"live"},
        {id:"p008",name:"앱 개발 절차 설명서",category:"edu",url:"#",desc:"웹앱 기획부터 배포까지 전체 개발 절차 한글 설명서",tags:["GitHub Pages","가이드"],status:"live"},
        {id:"p009",name:"LottoPro-AI v2.0",category:"science",url:"https://lottopro-ai-v2-0.onrender.com",desc:"10개 AI 알고리즘 탑재, 성능 모니터링 및 백테스팅 기능",tags:["Flask","Render"],status:"live"},
        {id:"p010",name:"LottoPro-AI v3.0",category:"science",url:"#",desc:"8개 알고리즘 동적 로딩, Glassmorphism UI, 사용자 예측 저장",tags:["Flask","Render"],status:"live"},
        {id:"p011",name:"Claude's EV Lotto System v2.0",category:"science",url:"#",desc:"기대값(EV) 최적화 전략. 인기 조합 회피로 수익률 극대화",tags:["Flask","Render"],status:"live"},
        {id:"p012",name:"LOTTO ORACLE v4.0",category:"science",url:"#",desc:"Google Colab 기반. 자동 튜닝 백테스트, 앙상블 예측 파이프라인",tags:["Colab"],status:"colab"}
    ]
};

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
async function init() {
    SITE_DATA = await loadData();
    CAT_ICONS = {};
    SITE_DATA.categories.forEach(c => CAT_ICONS[c.id] = c.icon);
    renderSite(SITE_DATA);
    setupFilters();
    setupScrollEffects();
    setupAdmin();
    window.addEventListener('scroll', () => {
        document.getElementById('navWrap').classList.toggle('scrolled', window.scrollY > 80);
    }, { passive: true });
}

async function loadData() {
    try {
        const r = await fetch('./projects.json?' + Date.now());
        if (!r.ok) throw new Error;
        return await r.json();
    } catch (e) {
        return JSON.parse(JSON.stringify(FALLBACK_DATA));
    }
}

/* ═══════════════════════════════════════════
   RENDER SITE
   ═══════════════════════════════════════════ */
function renderSite(data) {
    const { site, categories, projects } = data;
    document.getElementById('siteTitle').innerHTML = site.title.replace('에듀테크', '<em>에듀테크</em>');
    document.getElementById('siteSub').textContent = site.subtitle;
    document.getElementById('footerText').textContent = site.footer;
    document.getElementById('totalProjects').textContent = projects.length;
    document.getElementById('liveProjects').textContent = projects.filter(p => p.status === 'live').length;
    document.getElementById('totalCategories').textContent = categories.length;

    const nav = document.getElementById('navContainer');
    nav.innerHTML = '<button class="nav__btn active" data-filter="all">전체 ' + projects.length + '</button>';
    categories.forEach(cat => {
        const cnt = projects.filter(p => p.category === cat.id).length;
        nav.innerHTML += '<button class="nav__btn" data-filter="' + cat.id + '">' + cat.icon + ' ' + cat.label + ' ' + cnt + '</button>';
    });

    const main = document.getElementById('mainContent');
    main.innerHTML = '';
    categories.forEach(cat => {
        const cp = projects.filter(p => p.category === cat.id);
        if (!cp.length) return;
        const sec = document.createElement('section');
        sec.className = 'section';
        sec.dataset.category = cat.id;
        sec.innerHTML = '<div class="section__header"><div class="section__icon-wrap">' + cat.icon + '</div><h2 class="section__title">' + cat.label + '</h2><span class="section__count">' + cp.length + '개</span></div><div class="grid">' + cp.map((p, i) => cardHTML(p, cat.id, i)).join('') + '</div>';
        main.appendChild(sec);
    });

    document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
    setupScrollEffects();
}

function cardHTML(p, catId, i) {
    const isColab = p.status === 'colab';
    const tags = p.tags.map(t => {
        const s = TAG_STYLES[t] || { bg: '#f1f5f9', color: '#64748b' };
        return '<span class="tag" style="background:' + s.bg + ';color:' + s.color + '">' + t + '</span>';
    }).join('');
    return '<div class="card" data-cat="' + catId + '" style="animation-delay:' + (i * 0.09) + 's"><div class="card__head"><span class="card__status card__status--' + p.status + '"></span><span class="card__name">' + p.name + '</span></div><p class="card__desc">' + p.desc + '</p><div class="card__tags">' + tags + '</div><a class="card__go' + (isColab ? ' card__go--colab' : '') + '" href="' + p.url + '" target="_blank">' + (isColab ? 'Colab 열기' : '바로가기') + ' <span class="card__go-arrow">→</span></a></div>';
}

function setupFilters() {
    document.getElementById('navContainer').addEventListener('click', e => {
        const btn = e.target.closest('.nav__btn');
        if (!btn) return;
        document.querySelectorAll('.nav__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        document.querySelectorAll('.section').forEach(sec => {
            const show = f === 'all' || sec.dataset.category === f;
            sec.style.display = show ? '' : 'none';
            sec.dataset.hidden = show ? 'false' : 'true';
            if (show) sec.querySelectorAll('.card').forEach((c, i) => { c.style.animation = 'none'; c.offsetHeight; c.style.animation = 'cardReveal 0.55s ease-out ' + (i * 0.09) + 's forwards'; });
        });
    });
}

function setupScrollEffects() {
    const obs = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.08 });
    document.querySelectorAll('.section').forEach(s => obs.observe(s));
}

/* ═══════════════════════════════════════════
   ADMIN PANEL
   ═══════════════════════════════════════════ */
function setupAdmin() {
    const trigger = document.getElementById('adminTrigger');
    const overlay = document.getElementById('adminOverlay');
    const close = document.getElementById('adminClose');
    trigger.addEventListener('click', () => {
        overlay.classList.add('open');
        sessionStorage.getItem(CONFIG.AUTH_KEY) === 'true' ? renderAdminMain() : renderAdminLogin();
    });
    close.addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
}

function renderAdminLogin() {
    document.getElementById('adminBody').innerHTML = '<div class="admin-login"><div class="admin-login__icon">🔐</div><div class="admin-login__title">관리자 인증</div><div class="admin-login__desc">비밀번호를 입력하세요</div><input type="password" class="admin-login__input" id="adminPw" placeholder="비밀번호" autofocus><br><button class="admin-login__btn" id="adminLoginBtn">로그인</button></div>';
    const pw = document.getElementById('adminPw'), btn = document.getElementById('adminLoginBtn');
    const doLogin = () => {
        if (pw.value === CONFIG.ADMIN_PASSWORD) { sessionStorage.setItem(CONFIG.AUTH_KEY, 'true'); renderAdminMain(); }
        else { pw.classList.add('error'); setTimeout(() => pw.classList.remove('error'), 500); pw.value = ''; }
    };
    btn.addEventListener('click', doLogin);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

function renderAdminMain() {
    const token = localStorage.getItem(CONFIG.TOKEN_KEY);
    const hasToken = !!token;
    const projects = SITE_DATA.projects;
    const categories = SITE_DATA.categories;

    // Build category options for project form
    const catOptions = categories.map(c => '<option value="' + c.id + '">' + c.icon + ' ' + c.label + '</option>').join('');

    // Build category list for management
    const catListHTML = categories.map(c => {
        const cnt = projects.filter(p => p.category === c.id).length;
        return '<div class="cat-item"><span class="cat-item__icon">' + c.icon + '</span><span class="cat-item__label">' + c.label + '</span><span class="cat-item__count">' + cnt + '개</span><div class="cat-item__actions"><button class="cat-item__edit" data-catid="' + c.id + '" title="수정">✏️</button><button class="cat-item__del" data-catid="' + c.id + '" title="삭제">🗑️</button></div></div>';
    }).join('');

    document.getElementById('adminBody').innerHTML =
        // Token section
        '<div class="admin-section"><div class="admin-section__title">🔑 GitHub 토큰</div><div class="token-bar"><input type="password" id="tokenInput" placeholder="ghp_xxxx..." value="' + (token || '') + '"><button id="tokenSaveBtn">' + (hasToken ? '변경' : '저장') + '</button></div><div class="token-status ' + (hasToken ? 'ok' : 'none') + '" id="tokenStatus">' + (hasToken ? '✅ 토큰 설정 완료' : '⚠️ GitHub Token이 필요합니다') + '</div><p class="help-text">GitHub → Settings → Developer settings → Personal access tokens (classic) → <strong>repo</strong> 권한</p></div>' +

        // Category management section (NEW!)
        '<div class="admin-section"><div class="admin-section__title">📂 카테고리 관리 (' + categories.length + '개)</div><div id="catList">' + catListHTML + '</div><div class="admin-section__title" id="catFormTitle" style="margin-top:0.7rem;font-size:0.72rem;">➕ 새 카테고리 추가</div><div class="cat-add-bar"><input type="text" class="cat-icon-input" id="newCatIcon" placeholder="🆕" maxlength="2"><input type="text" id="newCatLabel" placeholder="카테고리 이름"><button id="addCatBtn">추가</button><button id="cancelCatBtn" class="btn btn--secondary" style="display:none;padding:0.4rem 0.6rem;font-size:0.72rem;">취소</button></div><p class="help-text">아이콘은 이모지를 사용하세요 (예: 🔧 💡 🎮 📐 🌐)</p></div>' +

        // Project form section
        '<div class="admin-section"><div class="admin-section__title" id="formTitle">➕ 새 프로젝트 추가</div><div class="form-grid"><div class="form-field"><label>프로젝트 이름 *</label><input type="text" id="fName" placeholder="예: 출결 관리 시스템"></div><div class="form-field"><label>카테고리 *</label><select id="fCategory">' + catOptions + '</select></div><div class="form-field form-grid--full"><label>URL *</label><input type="text" id="fUrl" placeholder="https://..."></div><div class="form-field form-grid--full"><label>설명</label><textarea id="fDesc" placeholder="프로젝트에 대한 간단한 설명"></textarea></div><div class="form-field"><label>태그 (쉼표 구분)</label><input type="text" id="fTags" placeholder="Flask, Render"></div><div class="form-field"><label>상태</label><select id="fStatus"><option value="live">🟢 운영 중</option><option value="dev">🟡 개발 중</option><option value="colab">🔵 Colab</option></select></div><div class="form-actions"><button class="btn btn--primary" id="formSaveBtn">💾 저장 (GitHub 반영)</button><button class="btn btn--secondary" id="formCancelBtn" style="display:none">취소</button></div></div></div>' +

        // Project list section
        '<div class="admin-section"><div class="admin-section__title">📋 프로젝트 목록 (' + projects.length + '개)</div><div id="adminProjectList">' + projects.map(p => adminProjectHTML(p)).join('') + '</div></div>' +

        // Logout
        '<div style="text-align:center;padding-top:0.4rem;"><button class="btn btn--secondary" id="adminLogout">🚪 로그아웃</button></div>';

    // Event bindings
    document.getElementById('tokenSaveBtn').addEventListener('click', saveToken);
    document.getElementById('formSaveBtn').addEventListener('click', saveProject);
    document.getElementById('formCancelBtn').addEventListener('click', resetForm);
    document.getElementById('addCatBtn').addEventListener('click', addCategory);
    document.getElementById('cancelCatBtn').addEventListener('click', resetCategoryForm);
    document.getElementById('adminLogout').addEventListener('click', () => { sessionStorage.removeItem(CONFIG.AUTH_KEY); document.getElementById('adminOverlay').classList.remove('open'); });

    // Category edit/delete events
    document.getElementById('catList').addEventListener('click', e => {
        const editBtn = e.target.closest('.cat-item__edit');
        const delBtn = e.target.closest('.cat-item__del');
        if (editBtn) startEditCategory(editBtn.dataset.catid);
        if (delBtn) deleteCategory(delBtn.dataset.catid);
    });

    // Project edit/delete events
    document.getElementById('adminProjectList').addEventListener('click', e => {
        const ed = e.target.closest('.admin-project__btn--edit');
        const dl = e.target.closest('.admin-project__btn--del');
        if (ed) startEdit(ed.dataset.id);
        if (dl) deleteProject(dl.dataset.id);
    });
}

function adminProjectHTML(p) {
    const icon = CAT_ICONS[p.category] || '📁';
    const sl = { live: '운영', dev: '개발', colab: 'Colab' }[p.status] || p.status;
    return '<div class="admin-project"><span class="admin-project__cat">' + icon + '</span><span class="admin-project__name">' + p.name + '</span><span class="admin-project__status admin-project__status--' + p.status + '">' + sl + '</span><div class="admin-project__actions"><button class="admin-project__btn admin-project__btn--edit" data-id="' + p.id + '" title="수정">✏️</button><button class="admin-project__btn admin-project__btn--del" data-id="' + p.id + '" title="삭제">🗑️</button></div></div>';
}

/* ═══════════════════════════════════════════
   CATEGORY CRUD (NEW!)
   ═══════════════════════════════════════════ */
function startEditCategory(catId) {
    const cat = SITE_DATA.categories.find(c => c.id === catId);
    if (!cat) return;
    editingCategoryId = catId;
    document.getElementById('catFormTitle').textContent = '✏️ 카테고리 수정: ' + cat.label;
    document.getElementById('newCatIcon').value = cat.icon;
    document.getElementById('newCatLabel').value = cat.label;
    document.getElementById('addCatBtn').textContent = '수정';
    document.getElementById('cancelCatBtn').style.display = '';
    document.getElementById('catFormTitle').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetCategoryForm() {
    editingCategoryId = null;
    document.getElementById('catFormTitle').textContent = '➕ 새 카테고리 추가';
    document.getElementById('newCatIcon').value = '';
    document.getElementById('newCatLabel').value = '';
    document.getElementById('addCatBtn').textContent = '추가';
    document.getElementById('cancelCatBtn').style.display = 'none';
}

async function addCategory() {
    const icon = document.getElementById('newCatIcon').value.trim() || '📁';
    const label = document.getElementById('newCatLabel').value.trim();
    if (!label) { showToast('카테고리 이름을 입력해주세요', 'error'); return; }

    if (editingCategoryId) {
        // 수정 모드
        const cat = SITE_DATA.categories.find(c => c.id === editingCategoryId);
        if (!cat) return;
        cat.icon = icon;
        cat.label = label;
        CAT_ICONS[editingCategoryId] = icon;

        // 해당 카테고리 프로젝트들의 참조는 id 기반이므로 자동 유지
        const saved = await pushToGitHub(SITE_DATA);
        if (saved) {
            showToast('"' + icon + ' ' + label + '" 카테고리가 수정되었습니다', 'success');
            resetCategoryForm();
            renderSite(SITE_DATA);
            renderAdminMain();
        }
    } else {
        // 추가 모드
        const id = 'cat_' + Date.now().toString(36);
        if (SITE_DATA.categories.find(c => c.label === label)) {
            showToast('이미 같은 이름의 카테고리가 있습니다', 'error'); return;
        }
        SITE_DATA.categories.push({ id, icon, label });
        CAT_ICONS[id] = icon;

        const saved = await pushToGitHub(SITE_DATA);
        if (saved) {
            showToast('"' + icon + ' ' + label + '" 카테고리가 추가되었습니다', 'success');
            renderSite(SITE_DATA);
            renderAdminMain();
        }
    }
}

async function deleteCategory(catId) {
    const cat = SITE_DATA.categories.find(c => c.id === catId);
    if (!cat) return;

    const projectCount = SITE_DATA.projects.filter(p => p.category === catId).length;
    if (projectCount > 0) {
        showToast('"' + cat.label + '"에 ' + projectCount + '개 프로젝트가 있어 삭제할 수 없습니다. 프로젝트를 먼저 이동/삭제하세요.', 'error');
        return;
    }

    if (!confirm('"' + cat.icon + ' ' + cat.label + '" 카테고리를 삭제할까요?')) return;

    SITE_DATA.categories = SITE_DATA.categories.filter(c => c.id !== catId);
    delete CAT_ICONS[catId];

    const saved = await pushToGitHub(SITE_DATA);
    if (saved) {
        showToast('카테고리가 삭제되었습니다', 'success');
        renderSite(SITE_DATA);
        renderAdminMain();
    }
}

/* ═══════════════════════════════════════════
   TOKEN, PROJECT CRUD, GITHUB API
   ═══════════════════════════════════════════ */
function saveToken() {
    const v = document.getElementById('tokenInput').value.trim();
    if (!v) { showToast('토큰을 입력해주세요', 'error'); return; }
    localStorage.setItem(CONFIG.TOKEN_KEY, v);
    document.getElementById('tokenStatus').className = 'token-status ok';
    document.getElementById('tokenStatus').textContent = '✅ 토큰이 저장되었습니다';
    document.getElementById('tokenSaveBtn').textContent = '변경';
    showToast('GitHub 토큰 저장 완료', 'success');
}

function resetForm() {
    editingProjectId = null;
    document.getElementById('formTitle').textContent = '➕ 새 프로젝트 추가';
    ['fName', 'fUrl', 'fDesc', 'fTags'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fCategory').value = SITE_DATA.categories[0]?.id || '';
    document.getElementById('fStatus').value = 'live';
    document.getElementById('formSaveBtn').textContent = '💾 저장 (GitHub 반영)';
    document.getElementById('formCancelBtn').style.display = 'none';
}

function startEdit(id) {
    const p = SITE_DATA.projects.find(x => x.id === id);
    if (!p) return;
    editingProjectId = id;
    document.getElementById('formTitle').textContent = '✏️ 프로젝트 수정';
    document.getElementById('fName').value = p.name;
    document.getElementById('fCategory').value = p.category;
    document.getElementById('fUrl').value = p.url;
    document.getElementById('fDesc').value = p.desc;
    document.getElementById('fTags').value = p.tags.join(', ');
    document.getElementById('fStatus').value = p.status;
    document.getElementById('formSaveBtn').textContent = '💾 수정 저장';
    document.getElementById('formCancelBtn').style.display = '';
    document.getElementById('formTitle').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function saveProject() {
    const name = document.getElementById('fName').value.trim();
    const category = document.getElementById('fCategory').value;
    const url = document.getElementById('fUrl').value.trim();
    const desc = document.getElementById('fDesc').value.trim();
    const tags = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean);
    const status = document.getElementById('fStatus').value;

    if (!name) { showToast('프로젝트 이름을 입력해주세요', 'error'); return; }
    if (!url) { showToast('URL을 입력해주세요', 'error'); return; }

    if (editingProjectId) {
        const idx = SITE_DATA.projects.findIndex(p => p.id === editingProjectId);
        if (idx !== -1) SITE_DATA.projects[idx] = { ...SITE_DATA.projects[idx], name, category, url, desc, tags, status };
    } else {
        SITE_DATA.projects.push({ id: 'p' + String(Date.now()).slice(-6), name, category, url, desc, tags, status });
    }

    const saved = await pushToGitHub(SITE_DATA);
    if (saved) {
        showToast(editingProjectId ? '프로젝트 수정 완료' : '새 프로젝트 추가 완료', 'success');
        resetForm();
        renderSite(SITE_DATA);
        renderAdminMain();
    }
}

async function deleteProject(id) {
    const p = SITE_DATA.projects.find(x => x.id === id);
    if (!p) return;
    if (!confirm('"' + p.name + '" 프로젝트를 삭제할까요?')) return;
    SITE_DATA.projects = SITE_DATA.projects.filter(x => x.id !== id);
    const saved = await pushToGitHub(SITE_DATA);
    if (saved) { showToast('프로젝트 삭제 완료', 'success'); renderSite(SITE_DATA); renderAdminMain(); }
}

async function pushToGitHub(data) {
    const token = localStorage.getItem(CONFIG.TOKEN_KEY);
    if (!token) { showToast('GitHub 토큰을 먼저 설정해주세요', 'error'); return false; }
    const saveBtn = document.getElementById('formSaveBtn');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ 저장 중...'; }
    try {
        const getRes = await fetch('https://api.github.com/repos/' + CONFIG.GITHUB_OWNER + '/' + CONFIG.GITHUB_REPO + '/contents/' + CONFIG.FILE_PATH, { headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' } });
        if (!getRes.ok) throw new Error((await getRes.json()).message || '파일을 찾을 수 없습니다');
        const fileInfo = await getRes.json();
        GITHUB_SHA = fileInfo.sha;
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const putRes = await fetch('https://api.github.com/repos/' + CONFIG.GITHUB_OWNER + '/' + CONFIG.GITHUB_REPO + '/contents/' + CONFIG.FILE_PATH, { method: 'PUT', headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify({ message: '📦 업데이트 (' + new Date().toLocaleString('ko-KR') + ')', content: content, sha: GITHUB_SHA }) });
        if (!putRes.ok) throw new Error((await putRes.json()).message || '커밋 실패');
        return true;
    } catch (err) {
        console.error('GitHub API Error:', err);
        showToast('GitHub 저장 실패: ' + err.message, 'error');
        return false;
    } finally {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 저장 (GitHub 반영)'; }
    }
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast toast--' + (type || 'info') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
